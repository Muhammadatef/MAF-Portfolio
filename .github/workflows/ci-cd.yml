# ============================================================
# GitHub Actions CI/CD Pipeline for MAF Portfolio
# ============================================================
# This workflow runs on every push and pull request to main branch
# It performs quality checks and helps catch issues before deployment

name: CI/CD Pipeline

# When to run this workflow
on:
  push:
    branches: [main]  # Runs when you push to main
  pull_request:
    branches: [main]  # Runs when someone creates a PR to main

jobs:
  # Job 1: Quality Checks
  quality-checks:
    name: Code Quality & Build
    runs-on: ubuntu-latest  # Uses GitHub's Ubuntu server

    steps:
      # Step 1: Get your code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js (your project uses Next.js which needs Node)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Use Node.js version 18
          cache: 'npm'  # Cache npm packages for faster builds

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci  # 'npm ci' is faster and more reliable than 'npm install' for CI

      # Step 4: Run TypeScript type checking
      - name: Type check
        run: npx tsc --noEmit  # Check for TypeScript errors without building

      # Step 5: Build the Next.js project
      - name: Build project
        run: npm run build
        env:
          # Tell Next.js to skip linting during build (we'll lint separately)
          NEXT_TELEMETRY_DISABLED: 1

      # Step 6: Run linter (optional - uncomment if you want)
      # - name: Lint code
      #   run: npm run lint

  # Job 2: Deploy to Vercel (optional - Vercel auto-deploys by default)
  # This job only runs after quality-checks passes
  deploy-preview:
    name: Deploy Preview Comment
    runs-on: ubuntu-latest
    needs: quality-checks  # Only runs if quality-checks succeeds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment Status
        run: |
          echo "✅ Quality checks passed!"
          echo "🚀 Vercel will auto-deploy this commit"
          echo "📦 Check deployment at: https://vercel.com"
